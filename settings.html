<section class="admin-page">

  <div class="admin-header">
    <h1>Store Settings</h1>
    <p>Update your store information.</p>
  </div>

  <div class="settings-box">

    <label>Store Name</label>
    <input id="store-name" type="text" placeholder="Petshub">

    <label>Store Email</label>
    <input id="store-email" type="email" placeholder="support@petshub.com">

    <label>Store Phone</label>
    <input id="store-phone" type="text" placeholder="123-456-7890">

    <label>Shipping Message</label>
    <textarea id="shipping-message" placeholder="Free shipping on orders over $50"></textarea>

    <button onclick="saveSettings()">Save Settings</button>
    <button class="clear-btn" onclick="resetSettings()">Reset Settings</button>

  </div>

</section>

<script>
let settings = JSON.parse(localStorage.getItem("petsHubSettings")) || {
  storeName: "Petshub",
  storeEmail: "support@petshub.com",
  storePhone: "123-456-7890",
  shippingMessage: "Free shipping on orders over $50"
};

document.getElementById("store-name").value = settings.storeName;
document.getElementById("store-email").value = settings.storeEmail;
document.getElementById("store-phone").value = settings.storePhone;
document.getElementById("shipping-message").value = settings.shippingMessage;

function saveSettings() {
  const newSettings = {
    storeName: document.getElementById("store-name").value,
    storeEmail: document.getElementById("store-email").value,
    storePhone: document.getElementById("store-phone").value,
    shippingMessage: document.getElementById("shipping-message").value
  };

  localStorage.setItem("petsHubSettings", JSON.stringify(newSettings));

  alert("Settings saved successfully!");
}

function resetSettings() {
  localStorage.removeItem("petsHubSettings");
  alert("Settings reset. Refresh the page.");
}
</script>

<script>

function logout(){

localStorage.removeItem(

"petsHubAdminLoggedIn"

)

sessionStorage.removeItem(

"petsHubAdminLoggedIn"

)

localStorage.removeItem("petsHubAdminToken")

sessionStorage.removeItem("petsHubAdminToken")

window.location.href=

"login.html"

}

</script>

</body>
