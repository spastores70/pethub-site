<section class="admin-page">

  <div class="admin-header">
    <h1>Customers</h1>
    <p>View customers from completed checkout forms.</p>
  </div>

  <div id="customers-list" class="customers-list"></div>

</section>

<script>
let orders = JSON.parse(localStorage.getItem("petsHubOrders")) || [];

function getCustomers() {
  const customerMap = {};

  orders.forEach(order => {
    const email = order.customer.email;

    if (!customerMap[email]) {
      customerMap[email] = {
        name: order.customer.name,
        email: order.customer.email,
        phone: order.customer.phone,
        address: order.customer.address,
        city: order.customer.city,
        state: order.customer.state,
        zip: order.customer.zip,
        totalOrders: 0,
        totalSpent: 0
      };
    }

    customerMap[email].totalOrders += 1;
    customerMap[email].totalSpent += order.total;
  });

  return Object.values(customerMap);
}

function renderCustomers() {
  const list = document.getElementById("customers-list");
  const customers = getCustomers();

  if (customers.length === 0) {
    list.innerHTML = "<div class='empty-box'>No customers yet.</div>";
    return;
  }

  let html = "";

  customers.forEach(customer => {
    html += `
      <div class="customer-card">
        <div>
          <h2>${customer.name}</h2>
          <p>${customer.email}</p>
          <p>${customer.phone}</p>
        </div>

        <div>
          <h3>Shipping Address</h3>
          <p>${customer.address}</p>
          <p>${customer.city}, ${customer.state} ${customer.zip}</p>
        </div>

        <div>
          <h3>Total Orders</h3>
          <p class="customer-number">${customer.totalOrders}</p>
        </div>

        <div>
          <h3>Total Spent</h3>
          <p class="customer-spent">$${customer.totalSpent.toFixed(2)}</p>
        </div>
      </div>
    `;
  });

  list.innerHTML = html;
}

renderCustomers();
</script>

<script>

function logout(){

localStorage.removeItem(

"petsHubAdminLoggedIn"

)

sessionStorage.removeItem(

"petsHubAdminLoggedIn"

)

localStorage.removeItem("petsHubAdminToken")

sessionStorage.removeItem("petsHubAdminToken")

window.location.href=

"login.html"

}

</script>
