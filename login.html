<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin Login — PetsHub</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<section class="login-page">
  <div class="login-box">
    <h1>🐾 PetsHub Admin</h1>
    <p>Login to manage your store</p>

    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <div class="remember-row">
      <label>
        <input type="checkbox" id="remember-me"> Remember Me
      </label>
      <a href="forgot.html">Forgot Password?</a>
    </div>

    <button onclick="login()">Login</button>

    <small>
      Demo: admin@petshub.com / admin123
    </small>
  </div>
</section>

<script>
function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const remember = document.getElementById("remember-me").checked;

  const storedPassword = localStorage.getItem("petsHubAdminPassword") || "admin123";

  if (email === "admin@petshub.com" && password === storedPassword) {
    if (remember) {
      localStorage.setItem("petsHubAdminLoggedIn", "true");
      localStorage.setItem("petsHubAdminToken", password);
    } else {
      sessionStorage.setItem("petsHubAdminLoggedIn", "true");
      sessionStorage.setItem("petsHubAdminToken", password);
    }
    window.location.href = "dashboard.html";
  } else {
    alert("Wrong email or password.");
  }
}
</script>

</body>
</html>
